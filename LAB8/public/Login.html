<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form action="/entrar" method="POST">

            <input type="text" name="usuario" placeholder="Usuario" required>

            <input type="password" name="senha" placeholder="Senha" required>

            <button type="submit">
                Entrar
            </button>

        </form>

    </div>

</body>

</html>
